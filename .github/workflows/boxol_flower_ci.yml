name: boxol-flower CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/boxol_flower/**"
      - "tests/test_import.py"
      - "scripts/boxol_flower_cli.py"
      - "boxol_flower_mono.py"
      - "requirements.txt"
      - ".github/workflows/boxol_flower_ci.yml"
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8 + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy numpy

      - name: flake8
        run: |
          python -m flake8 src/boxol_flower/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503

      - name: mypy
        run: |
          python -m mypy src/boxol_flower/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --explicit-package-bases

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-cov

      - name: Run boxol_flower tests
        run: |
          pytest tests/test_import.py \
            -v --tb=short \
            --cov=src/boxol_flower \
            --cov-report=term-missing \
            --pythonpath=src

  headless-cli:
    name: Headless CLI smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run headless CLI
        run: |
          PYTHONPATH=src python src/boxol_flower/cli.py \
            --headless \
            --layers 6 \
            --input "neural collab test"

      - name: Run headless CLI with custom params
        run: |
          PYTHONPATH=src python src/boxol_flower/cli.py \
            --headless \
            --layers 3 \
            --spacing 3.5 \
            --z-modulo 3 \
            --seed 42 \
            --steps 10
